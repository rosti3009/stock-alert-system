<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Performance — Trading System</title><link rel="stylesheet" href="/layout.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body><div class="app-shell"><aside class="sidebar"><div class="brand"><div class="brand-title">TRADING SYSTEM</div><div class="brand-subtitle">IBKR Paper Dashboard</div></div><nav class="side-nav"><a href="/dashboard">📊 Dashboard</a><a href="/market">🌐 Market</a><a href="/scanner">🔎 Scanner</a><a href="/analytics">📈 Analytics</a><a href="/positions">💼 Positions</a><a href="/broker-audit">🧾 Broker Audit</a><a href="/orders">🧾 Orders</a><a href="/performance" class="active">📊 Performance</a><a href="/portfolio">📁 Portfolio</a><a href="/history">📜 History</a><a href="/risk">⚠ Risk</a><a href="/system-health">🩺 System Health</a><a href="/strategies">🧠 Strategies</a><a href="/settings">⚙ Settings</a></nav></aside><main class="main-area"><header class="topbar"><div><h1 class="page-title">Advanced Performance</h1><div class="page-subtitle">Closed-position and order-derived paper trading analytics.</div></div><button class="primary" onclick="loadPerformance()">Refresh</button></header><div class="container"><div class="cards" id="cards"></div><div class="box chart-box wide"><h3>Equity Curve</h3><canvas id="equityChart"></canvas></div></div></main></div><script>
let chart; const money=v=>Number(v||0).toLocaleString(undefined,{style:'currency',currency:'USD'}); const pct=v=>`${Number(v||0).toFixed(2)}%`;
function card(label,value,cls=''){return `<div class="card"><h3>${label}</h3><div class="value ${cls}">${value}</div></div>`;}
async function loadPerformance(){const res=await fetch('/api/performance/advanced',{cache:'no-store'}); const d=await res.json(); document.getElementById('cards').innerHTML=[card('Win Rate',pct(d.win_rate),'blue'),card('Profit Factor',Number(d.profit_factor||0).toFixed(2),'purple'),card('Total PnL',money(d.total_pnl),d.total_pnl>=0?'green':'red'),card('Avg Winner',money(d.average_winner),'green'),card('Avg Loser',money(d.average_loser),'red'),card('Expectancy',money(d.expectancy),d.expectancy>=0?'green':'red'),card('Max Drawdown',money(d.max_drawdown),'yellow'),card('Open Unrealized PnL',money(d.open_unrealized_pnl),d.open_unrealized_pnl>=0?'green':'red')].join(''); const curve=d.equity_curve||[]; const ctx=document.getElementById('equityChart'); if(chart) chart.destroy(); chart=new Chart(ctx,{type:'line',data:{labels:curve.map(x=>x.label||x.timestamp||''),datasets:[{label:'Equity',data:curve.map(x=>x.equity||0),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.15)',fill:true,tension:.25}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e8eefc'}}},scales:{x:{ticks:{color:'#8090aa'},grid:{color:'#243149'}},y:{ticks:{color:'#8090aa'},grid:{color:'#243149'}}}}});}
loadPerformance();
</script></body></html>
